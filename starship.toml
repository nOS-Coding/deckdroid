# DeckDroid — Starship prompt config
add_newline = false
command_timeout = 500

format = """
[╭─](bold green)[$username](bold green)[@](green)[$hostname](bold cyan) [$directory](bold white)[$git_branch](bold yellow)[$git_status](yellow)
[╰─❯](bold green) """

[username]
show_always = true
style_user = "bold green"
style_root = "bold red"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "bold cyan"
format = "[$hostname]($style)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold white"
format = "[$path]($style) "

[git_branch]
style = "bold yellow"
format = "on [$symbol$branch]($style) "

[git_status]
style = "yellow"
format = "([$all_status$ahead_behind]($style)) "

# Battery section removed - causes issues on Android
# Use deckbat command instead for battery info

[python]
format = "via [🐍 $version]($style) "

[nodejs]
format = "via [⬢ $version]($style) "
